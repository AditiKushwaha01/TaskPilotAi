name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get code
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # ⚛️ Frontend (React)
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # =========================
      # 🐍 AI Service (Python)
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install AI dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt

      # =========================
      # ☕ Backend (Spring Boot)
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build backend
        run: |
          cd backend/taskpilot-ai
          mvn clean install
          env:
           MONGODB_URI: ${{ secrets.MONGODB_URI }}
